services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wpprecebo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wpprecebo
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wpprecebo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpprecebo -d wpprecebo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wpprecebo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
